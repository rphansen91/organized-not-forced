<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none">
  <!-- Pistol Squat Figure - Golden stick figure with joint circles -->
  <g stroke="#d4af37" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <!-- Head -->
    <circle cx="50" cy="18" r="6" fill="none"/>
    
    <!-- Neck to Spine -->
    <line x1="50" y1="24" x2="50" y2="32"/>
    
    <!-- Shoulders -->
    <line x1="38" y1="32" x2="62" y2="32"/>
    
    <!-- Left Arm (extended forward for balance) -->
    <line x1="38" y1="32" x2="26" y2="34"/>
    <line x1="26" y1="34" x2="14" y2="36"/>
    <circle cx="38" cy="32" r="3" fill="none"/>
    <circle cx="26" cy="34" r="3" fill="none"/>
    <circle cx="14" cy="36" r="3" fill="none"/>
    
    <!-- Right Arm (extended forward for balance) -->
    <line x1="62" y1="32" x2="74" y2="34"/>
    <line x1="74" y1="34" x2="86" y2="36"/>
    <circle cx="62" cy="32" r="3" fill="none"/>
    <circle cx="74" cy="34" r="3" fill="none"/>
    <circle cx="86" cy="36" r="3" fill="none"/>
    
    <!-- Spine to Pelvis -->
    <line x1="50" y1="32" x2="50" y2="55"/>
    <circle cx="50" cy="44" r="3" fill="none"/>
    
    <!-- Pelvis -->
    <circle cx="50" cy="55" r="4" fill="none"/>
    <line x1="44" y1="58" x2="56" y2="58"/>
    
    <!-- Standing Leg (left - deeply bent) -->
    <line x1="44" y1="58" x2="40" y2="72"/>
    <line x1="40" y1="72" x2="44" y2="88"/>
    <circle cx="44" cy="58" r="3" fill="none"/>
    <circle cx="40" cy="72" r="3" fill="none"/>
    <circle cx="44" cy="88" r="3" fill="none"/>
    
    <!-- Extended Leg (right - straight out front) -->
    <line x1="56" y1="58" x2="72" y2="60"/>
    <line x1="72" y1="60" x2="88" y2="62"/>
    <circle cx="56" cy="58" r="3" fill="none"/>
    <circle cx="72" cy="60" r="3" fill="none"/>
    <circle cx="88" cy="62" r="3" fill="none"/>
  </g>
</svg>
